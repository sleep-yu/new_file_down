<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件上传</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #764ba2;
      background: #f0f1ff;
    }

    .upload-area .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-area p {
      color: #666;
      font-size: 16px;
    }

    .upload-area .hint {
      font-size: 14px;
      color: #999;
      margin-top: 8px;
    }

    #fileInput {
      display: none;
    }

    .file-info {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      display: none;
    }

    .file-info.show {
      display: block;
    }

    .file-info .name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
      word-break: break-all;
    }

    .file-info .size {
      color: #666;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-upload {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-upload:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-upload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress {
      margin-top: 20px;
      display: none;
    }

    .progress.show {
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .result.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>文件上传</h1>

    <div class="upload-area" id="uploadArea">
      <div class="icon">📁</div>
      <p>点击选择文件或拖拽文件到这里</p>
      <p class="hint">支持任意类型文件</p>
    </div>

    <input type="file" id="fileInput">

    <div class="file-info" id="fileInfo">
      <div class="name" id="fileName"></div>
      <div class="size" id="fileSize"></div>
    </div>

    <div class="progress" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="result" id="result"></div>

    <button class="btn btn-upload" id="uploadBtn" disabled>上传文件</button>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const uploadBtn = document.getElementById('uploadBtn');
    const result = document.getElementById('result');

    let selectedFile = null;

    // 点击上传区域选择文件
    uploadArea.addEventListener('click', () => {
      fileInput.click();
    });

    // 文件选择变化
    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // 处理选择的文件
    function handleFile(file) {
      console.log(file)
      if (!file) return;

      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatFileSize(file.size);
      fileInfo.classList.add('show');
      uploadBtn.disabled = false;
      result.classList.remove('success', 'error');
    }

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    // 上传按钮点击
    uploadBtn.addEventListener('click', async () => {
      console.log(selectedFile, 'selectedFile')
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      result.classList.remove('success', 'error');

      try {
        // 创建 FormData 对象
        const formData = new FormData();
        formData.append('file', selectedFile);

        const response = await fetch('http://localhost:3000/upload', {
          method: 'POST',
          body: formData
          // 不需要手动设置 Content-Type，浏览器会自动设置 multipart/form-data
        });

        const data = await response.json();
        result.textContent = `上传成功！文件大小: ${formatFileSize(data.size)}`;
        result.classList.add('success');

      } catch (error) {
        result.textContent = `上传失败: ${error.message}`;
        result.classList.add('error');
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
